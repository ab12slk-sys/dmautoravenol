<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DM Auto - Portal Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; touch-action: manipulation; }
        .view-hidden { display: none !important; }
        .bg-dm-blue { background-color: #003366; }
        .text-dm-yellow { color: #ffcc00; }
        .bg-dm-yellow { background-color: #ffcc00; }
        .client-card { border-left: 10px solid #e2e8f0; }
        .active-client { border-left-color: #ffcc00; background-color: #fffbeb; }
    </style>
</head>
<body class="pb-32">

    <div id="view-login" class="fixed inset-0 z-[100] bg-blue-900 flex flex-col items-center justify-center p-6 text-white text-center">
        <h2 class="text-2xl font-black mb-10">Autentificare DM Auto</h2>
        <input type="text" id="login-user" placeholder="UTILIZATOR" class="w-full p-4 mb-4 rounded-xl text-black uppercase">
        <input type="password" id="login-pass" placeholder="PAROLĂ" class="w-full p-4 mb-8 rounded-xl text-black">
        <button onclick="handleLogin()" class="w-full bg-yellow-400 text-blue-900 py-4 rounded-xl font-black uppercase">Intră</button>
    </div>

    <div id="app-content" class="view-hidden">
        <header class="bg-dm-blue text-white p-4 sticky top-0 z-40 shadow-lg">
            <button onclick="switchView('clients')" class="w-full bg-black/30 p-4 rounded-xl text-left border border-white/20">
                <p class="text-[10px] text-yellow-400 font-bold uppercase">Client Actual:</p>
                <p id="header-client-name" class="font-black text-xl truncate">Neselectat</p>
            </button>
            <button onclick="syncAllData()" class="mt-4 w-full bg-white/10 p-3 rounded-lg font-bold text-sm">🔄 Sincronizează Date</button>
        </header>

        <div id="view-catalog" class="p-4 view-hidden">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="selectCategory('Ravenol')" class="bg-blue-800 text-white p-6 rounded-xl font-bold">RAVENOL</button>
                <button onclick="selectCategory('Banner')" class="bg-blue-800 text-white p-6 rounded-xl font-bold">BANNER</button>
                <button onclick="selectCategory('Cyclon')" class="bg-blue-800 text-white p-6 rounded-xl font-bold">CYCLON</button>
                <button onclick="selectCategory('Cemsa')" class="bg-blue-800 text-white p-6 rounded-xl font-bold">ALTELE</button>
            </div>
            <div id="product-section" class="view-hidden mt-6">
                <table class="w-full text-left bg-white shadow rounded-lg">
                    <tbody id="productTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="view-clients" class="p-4">
            <h2 class="text-xl font-black mb-4">Clienți</h2>
            <input type="text" id="clientSearch" onkeyup="filterClients()" placeholder="Caută..." class="w-full p-4 mb-4 border rounded-xl">
            <div id="clients-list" class="space-y-3"></div>
        </div>

        <div id="view-client-mode" class="view-hidden p-6 text-center">
            <div id="sold-box" class="bg-white p-6 rounded-2xl shadow border-l-8 border-gray-300 mb-6">
                <p class="text-gray-500 font-bold uppercase">Sold Curent:</p>
                <p id="display-sold" class="text-3xl font-black text-red-600">0.00 RON</p>
            </div>
            <button onclick="switchView('catalog')" class="w-full bg-blue-900 text-white p-5 rounded-xl font-black mb-4">VÂNZARE</button>
            <button onclick="renderSoldItems()" class="w-full bg-green-600 text-white p-5 rounded-xl font-black mb-4">VEZI FACTURI</button>
            <button onclick="switchView('clients')" class="w-full bg-gray-200 p-4 rounded-xl font-bold">SCHIMBĂ CLIENT</button>
        </div>
    </div>

    <script>
        const AGENTS = { 'calin': { pass: 'mocean', name: 'Călin Mocean', filter: 'MOCEAN' }, 'ovidiu': { pass: 'rahovean', name: 'Ovidiu Rahovean', filter: 'RAHOVEAN' } };
        let allProductsRaw = [], allClients = [], allSoldData = [], selectedClient = null;

        function normalizeName(name) { return name.toString().toUpperCase().replace(/[^A-Z0-9]/g, ''); }
        function formatPriceNum(val) { if (!val) return 0; return parseFloat(val.toString().replace(/\./g, '').replace(',', '.')) || 0; }

        function handleLogin() {
            const u = document.getElementById('login-user').value.toLowerCase().trim();
            const p = document.getElementById('login-pass').value.trim();
            if (AGENTS[u] && AGENTS[u].pass === p) {
                document.getElementById('view-login').classList.add('view-hidden');
                document.getElementById('app-content').classList.remove('view-hidden');
                syncAllData();
            } else alert("Date incorecte!");
        }

        async function syncAllData() {
            await syncMasterData(); await syncClients(); await syncSoldData();
            alert("Sincronizat!");
        }

        async function syncMasterData() {
            try {
                const response = await fetch('./STOCEGIUNIE.xlsx?t=' + new Date().getTime());
                const data = await response.arrayBuffer();
                const wb = XLSX.read(data, {type: 'array'});
                allProductsRaw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            } catch(e) { console.error(e); }
        }

        async function syncClients() {
            try {
                const response = await fetch('./LISTA_CLIENTI.xlsx?t=' + new Date().getTime());
                const data = await response.arrayBuffer();
                const wb = XLSX.read(data, {type: 'array'});
                allClients = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                renderClients(allClients);
            } catch(e) { console.error(e); }
        }

        async function syncSoldData() {
            allSoldData = [];
            try {
                const response = await fetch('./Facturi_Neincasate.xlsx?t=' + new Date().getTime());
                const data = await response.arrayBuffer();
                const wb = XLSX.read(data, {type: 'array'});
                const sh = wb.Sheets[wb.SheetNames[0]];
                const raw = XLSX.utils.sheet_to_json(sh, { header: 1 });
                let currentClient = "";
                raw.forEach((row, index) => {
                    if (index === 0) return;
                    if (row[0] && row[0].toString().trim()) currentClient = row[0].toString().trim().toUpperCase();
                    if (row[1] && currentClient) {
                        allSoldData.push({ client: normalizeName(currentClient), rest: formatPriceNum(row[5]) });
                    }
                });
            } catch (e) { console.error("Eroare solduri:", e); }
        }

        function renderClients(list) {
            const container = document.getElementById('clients-list');
            container.innerHTML = list.map(c => `<div onclick="selectClient('${c.denumire.replace(/'/g, "\\'")}')" class="client-card p-4 bg-white shadow rounded-lg cursor-pointer">${c.denumire}</div>`).join('');
        }

        function selectClient(name) {
            selectedClient = { name };
            document.getElementById('header-client-name').innerText = name;
            const sold = allSoldData.filter(r => r.client.includes(normalizeName(name))).reduce((sum, r) => sum + r.rest, 0);
            document.getElementById('display-sold').innerText = sold.toFixed(2) + " RON";
            switchView('client-mode');
        }

        function switchView(v) {
            document.querySelectorAll('#app-content > div').forEach(div => div.classList.add('view-hidden'));
            document.getElementById('view-' + v).classList.remove('view-hidden');
        }

        function filterClients() {
            const q = document.getElementById('clientSearch').value.toLowerCase();
            renderClients(allClients.filter(c => c.denumire.toLowerCase().includes(q)));
        }
    </script>
</body>
</html>
