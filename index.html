<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DM Auto - Portal Agent</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#003366">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .bg-dm-blue { background-color: #003366; }
        .text-dm-yellow { color: #ffcc00; }
        .bg-dm-yellow { background-color: #ffcc00; }
        
        .category-card {
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
            aspect-ratio: 16/11;
            background-size: cover;
            background-position: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .category-overlay {
            background: linear-gradient(to top, rgba(0, 30, 60, 0.9) 0%, rgba(0, 30, 60, 0.2) 60%, transparent 100%);
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1rem;
        }

        .quick-order-table th {
            font-size: 9px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 10px 8px;
            position: sticky;
            top: 0;
            background: #f8fafc;
            z-index: 10;
        }

        .quick-order-table td {
            padding: 12px 8px;
            border-bottom: 1px solid #f1f5f9;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #003366;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-40">

    <!-- Header -->
    <header class="bg-dm-blue text-white p-5 pb-6 shadow-xl rounded-b-[2rem]">
        <div class="flex items-center gap-4 mb-5">
            <div class="bg-black p-2 rounded-lg border border-gray-700 shadow-lg">
                <div class="text-center leading-none">
                    <span class="text-white font-black text-2xl italic block">DM</span>
                    <span class="text-dm-yellow font-black text-[11px] block tracking-[0.2em] -mt-1">AUTO</span>
                </div>
            </div>
            <div class="flex-1">
                <h1 class="text-sm font-medium opacity-90">Salut, <span class="font-black text-white">Calin Mocean!</span></h1>
                <p class="text-[10px] font-bold text-dm-yellow uppercase tracking-widest mt-0.5 italic">Agent Alba-Hunedoara</p>
            </div>
            
            <button onclick="document.getElementById('excelInput').click()" class="bg-white/10 p-3 rounded-2xl border border-white/20 active:scale-90 transition-all">
                <span class="text-xl">🔄</span>
            </button>
            <input type="file" id="excelInput" class="hidden" accept=".xlsx, .xls, .csv">
        </div>

        <div class="relative">
            <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="Caută produs (ex: VMP 5W-30)..." 
                   class="w-full p-3.5 pr-12 rounded-xl text-gray-800 text-sm focus:outline-none shadow-2xl border-none font-semibold">
            <div class="absolute right-4 top-3.5 text-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>
    </header>

    <!-- Loading Indicator -->
    <div id="loadingOverlay" class="hidden mx-4 mt-2">
        <div class="bg-blue-50 border border-blue-100 p-3 rounded-lg flex items-center justify-center gap-3">
            <div class="loader"></div>
            <span class="text-[10px] text-dm-blue font-black uppercase tracking-widest">Se încarcă oferta Ravenol...</span>
        </div>
    </div>

    <!-- Grila Categorii -->
    <div class="p-4 grid grid-cols-2 gap-4">
        <div class="category-card" style="background-image: url('ravenol.jpg');">
            <div class="category-overlay"><h3 class="text-white font-black text-xs uppercase">RAVENOL</h3></div>
        </div>
        <div class="category-card" style="background-image: url('banner.jpg');">
            <div class="category-overlay"><h3 class="text-white font-black text-xs uppercase">BANNER</h3></div>
        </div>
    </div>

    <!-- Tabel Produse Optimizat -->
    <div class="px-4">
        <div class="flex justify-between items-center mb-3 px-1">
            <h3 class="text-xs font-black uppercase tracking-widest text-gray-500 italic">Catalog Produse</h3>
            <span id="productCount" class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter italic">Așteptare fișier...</span>
        </div>
        
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            <div class="overflow-x-auto max-h-[600px]">
                <table class="w-full text-left quick-order-table">
                    <thead class="bg-gray-50 border-b border-gray-100">
                        <tr>
                            <th class="w-1/3">Denumire</th>
                            <th class="text-center">UM</th>
                            <th class="text-right">Preț FĂRĂ TVA</th>
                            <th class="text-right">Preț CU TVA</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody" class="divide-y divide-gray-50">
                        <tr id="placeholderRow">
                            <td colspan="4" class="py-16 text-center text-gray-300">
                                <span class="text-4xl block mb-2">📊</span>
                                <p class="text-[10px] font-black uppercase">Încarcă oferta Ravenol folosind butonul 🔄</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="fixed bottom-20 left-0 w-full px-4 py-3 z-40">
        <button class="w-full bg-dm-yellow text-dm-blue py-4 rounded-xl font-black text-sm uppercase shadow-2xl flex items-center justify-center gap-3 border-b-4 border-yellow-600">
            <span>🛒</span> FINALIZARE COMANDĂ
        </button>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 p-3 flex justify-around shadow-2xl z-50">
        <button class="flex flex-col items-center text-dm-blue">
            <span class="text-2xl">🏠</span><span class="text-[9px] font-black uppercase mt-1">Acasă</span>
        </button>
        <button class="flex flex-col items-center text-gray-400">
            <span class="text-2xl">👥</span><span class="text-[9px] font-black uppercase mt-1">Clienți</span>
        </button>
        <button class="flex flex-col items-center text-gray-400">
            <span class="text-2xl">📋</span><span class="text-[9px] font-black uppercase mt-1">Catalog</span>
        </button>
    </nav>

    <script>
        let allProducts = [];

        // FUNCTIE: Încărcare automată la pornire
        window.addEventListener('load', () => {
            const savedData = localStorage.getItem('dmauto_last_products');
            if (savedData) {
                try {
                    allProducts = JSON.parse(savedData);
                    renderProducts(allProducts);
                    document.getElementById('productCount').innerText = allProducts.length + " Produse (Salvate)";
                } catch (e) {
                    console.error("Eroare la incarcarea datelor salvate", e);
                }
            }
        });

        document.getElementById('excelInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loadingOverlay').classList.remove('hidden');
            
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet, { range: 3, defval: "" });

                    allProducts = json.filter(p => {
                        const keys = Object.keys(p);
                        const denumireKey = keys.find(k => k.trim() === "Denumire");
                        return p[denumireKey] && p[denumireKey].toString().trim() !== "" && p[denumireKey] !== "Denumire";
                    });

                    // FUNCTIE: Salvare în memoria tabletei
                    localStorage.setItem('dmauto_last_products', JSON.stringify(allProducts));

                    renderProducts(allProducts);
                    document.getElementById('productCount').innerText = allProducts.length + " Produse Încărcate";
                } catch (err) {
                    console.error(err);
                    alert("Eroare la procesarea fișierului!");
                } finally {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function renderProducts(products) {
            const tbody = document.getElementById('productTableBody');
            let html = '';
            
            products.forEach(p => {
                const keys = Object.keys(p);
                const kDenumire = keys.find(k => k.trim() === "Denumire");
                const kUM = keys.find(k => k.trim() === "UM");
                const kPretFaraTva = keys.find(k => k.trim() === "Pret fara TVA");
                const kPretCuTva = keys.find(k => k.trim() === "Pret cu TVA");
                const kValuta = keys.find(k => k.trim() === "Valuta");

                const denumire = p[kDenumire] || "";
                const um = p[kUM] || "BUC";
                const fPretFara = formatPrice(p[kPretFaraTva]);
                const fPretCu = formatPrice(p[kPretCuTva]);
                const valuta = p[kValuta] || "RON";

                html += `
                    <tr>
                        <td class="font-black text-dm-blue text-[10px] uppercase leading-tight">${denumire}</td>
                        <td class="text-center text-[9px] font-bold text-gray-400 uppercase">${um}</td>
                        <td class="font-bold text-right text-gray-600 text-[10px] whitespace-nowrap">${fPretFara} ${valuta}</td>
                        <td class="font-black text-right text-dm-blue text-[10px] whitespace-nowrap">${fPretCu} ${valuta}</td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html || '<tr><td colspan="4" class="py-10 text-center text-gray-400">Niciun produs găsit.</td></tr>';
        }

        function formatPrice(val) {
            if (!val && val !== 0) return "0.00";
            if (typeof val === 'number') return val.toFixed(2);
            const n = parseFloat(val.toString().replace(',', '.'));
            return isNaN(n) ? "0.00" : n.toFixed(2);
        }

        function filterProducts() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => {
                const kDenumire = Object.keys(p).find(k => k.trim() === "Denumire");
                return p[kDenumire] && p[kDenumire].toString().toLowerCase().includes(q);
            });
            renderProducts(filtered);
        }
    </script>
</body>
</html>
