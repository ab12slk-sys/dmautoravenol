<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DM Auto - Portal Agent</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#003366">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; touch-action: manipulation; overflow-x: hidden; }
        .bg-dm-blue { background-color: #003366; }
        .text-dm-yellow { color: #ffcc00; }
        .bg-dm-yellow { background-color: #ffcc00; }
        
        .category-card { position: relative; overflow: hidden; border-radius: 1.5rem; aspect-ratio: 16/10; background-size: cover; background-position: center; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); cursor: pointer; transition: all 0.3s ease; border: 4px solid transparent; }
        .category-card:active, .mode-btn:active, .qty-btn:active, .nav-btn:active { transform: scale(0.92); filter: brightness(0.9); }
        .category-overlay { background: linear-gradient(to top, rgba(0, 30, 60, 0.95) 0%, rgba(0, 30, 60, 0.4) 60%, transparent 100%); position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 1.5rem; }

        .qty-btn { width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; border-radius: 18px; font-weight: 900; }
        .cart-badge { position: absolute; top: -10px; right: -10px; background: #ffcc00; color: #003366; font-size: 13px; font-weight: 900; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .view-hidden { display: none !important; }
        .client-card { border-left: 10px solid #e2e8f0; transition: all 0.2s; }
        .client-card.active-client { border-left-color: #ffcc00; background-color: #fffbeb; }
        
        #custom-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150px); background: #1e293b; color: white; padding: 18px 36px; border-radius: 24px; font-weight: 800; z-index: 200; box-shadow: 0 20px 50px rgba(0,0,0,0.4); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-transform: uppercase; font-size: 14px; border: 2px solid #ffcc00; text-align: center; }
        #custom-toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="pb-32">
    <div id="custom-toast">Mesaj Notificare</div>
    
    <!-- LOGIN -->
    <div id="view-login" class="fixed inset-0 z-[100] bg-blue-900 flex flex-col items-center justify-center p-6 text-center">
        <h2 class="text-dm-yellow font-black text-2xl tracking-widest italic uppercase mb-10">Portal Agenți</h2>
        <input type="text" id="login-user" placeholder="UTILIZATOR" class="w-full max-w-xs p-5 mb-4 rounded-2xl text-black uppercase font-bold">
        <input type="password" id="login-pass" placeholder="PAROLĂ" class="w-full max-w-xs p-5 mb-8 rounded-2xl text-black">
        <button onclick="handleLogin()" class="w-full max-w-xs bg-dm-yellow py-5 rounded-2xl font-black uppercase">Intră</button>
        <p id="login-error" class="mt-4 text-red-400 hidden">Date incorecte!</p>
    </div>

    <!-- APP -->
    <div id="app-content" class="view-hidden">
        <header class="bg-dm-blue text-white p-5 sticky top-0 z-40 shadow-xl rounded-b-[2rem]">
            <div class="flex items-center gap-4">
                <button id="header-back-btn" onclick="goBack()" class="bg-white/10 p-4 rounded-xl view-hidden">⬅️</button>
                <div class="flex-1">
                    <button onclick="switchView('clients')" class="w-full text-left bg-black/20 p-4 rounded-xl">
                        <span class="text-[10px] text-dm-yellow uppercase font-bold">Client Selectat:</span>
                        <div id="header-client-name" class="text-xl font-black truncate">Neselectat</div>
                    </button>
                </div>
                <button onclick="triggerManualSync()" class="p-4 bg-white/10 rounded-xl">🔄</button>
            </div>
            <div id="search-container" class="mt-4">
                <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="Caută produs..." class="w-full p-4 rounded-xl text-black font-bold uppercase">
            </div>
        </header>

        <main class="p-4">
            <!-- CATALOG -->
            <div id="view-catalog">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <button onclick="selectCategory('Inventar')" class="bg-slate-800 text-white p-6 rounded-2xl font-black col-span-2">📦 INVENTAR TOTAL</button>
                    <button onclick="selectCategory('Ravenol')" class="bg-blue-800 text-white p-6 rounded-2xl font-bold">RAVENOL</button>
                    <button onclick="selectCategory('Banner')" class="bg-blue-800 text-white p-6 rounded-2xl font-bold">BANNER</button>
                    <button onclick="selectCategory('Cyclon')" class="bg-blue-800 text-white p-6 rounded-2xl font-bold">CYCLON</button>
                    <button onclick="selectCategory('Cemsa')" class="bg-blue-800 text-white p-6 rounded-2xl font-bold">ALTELE</button>
                </div>
                <div id="product-section" class="view-hidden">
                    <table class="w-full text-left">
                        <tbody id="productTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- CLIENTI -->
            <div id="view-clients" class="view-hidden">
                <h2 class="text-2xl font-black mb-4">👤 Clienți</h2>
                <input type="text" id="clientSearch" onkeyup="filterClients()" placeholder="Caută..." class="w-full p-4 mb-4 rounded-xl border">
                <div id="clients-list" class="space-y-3"></div>
            </div>

            <!-- MOD CLIENT -->
            <div id="view-client-mode" class="view-hidden text-center">
                <div id="sold-box" class="bg-red-100 p-6 rounded-2xl mb-6 text-red-700 font-black text-2xl shadow-lg hidden"></div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="switchView('catalog')" class="bg-blue-600 text-white p-10 rounded-2xl font-black text-xl">🛒 COMANDĂ</button>
                    <button onclick="renderSoldItems(); switchView('incasare')" class="bg-green-600 text-white p-10 rounded-2xl font-black text-xl">💰 ÎNCASARE</button>
                </div>
            </div>

            <!-- INCASARE -->
            <div id="view-incasare" class="view-hidden">
                <h2 class="text-2xl font-black mb-4">💰 Facturi Neîncasate</h2>
                <div id="sold-items-table" class="space-y-3"></div>
            </div>

            <!-- COȘ -->
            <div id="view-cart" class="view-hidden">
                <h2 class="text-2xl font-black mb-4">🛒 Coș</h2>
                <div id="cart-content" class="space-y-3"></div>
                <button onclick="trimiteWhatsApp()" class="w-full bg-green-500 text-white p-5 rounded-2xl font-black mt-6">TRIMITE COMANDĂ</button>
            </div>
        </main>
    </div>

    <script>
        const AGENTS = { 'calin': { pass: 'mocean', name: 'Călin Mocean' }, 'ovidiu': { pass: 'rahovean', name: 'Ovidiu Rahovean' } };
        let allProducts = [], allClients = [], allSold = [], cart = {}, selectedClient = null;

        function handleLogin() {
            const u = document.getElementById('login-user').value.toLowerCase().trim();
            const p = document.getElementById('login-pass').value.trim();
            if (AGENTS[u] && AGENTS[u].pass === p) {
                document.getElementById('view-login').classList.add('view-hidden');
                document.getElementById('app-content').classList.remove('view-hidden');
                document.getElementById('agent-display-name').innerText = AGENTS[u].name;
                triggerManualSync();
            } else alert("Date incorecte!");
        }

        async function triggerManualSync() {
            try {
                // 1. STOCURI
                const resP = await fetch('STOCEGIUNIE.xlsx?t=' + Date.now());
                const dataP = await resP.arrayBuffer();
                const wbP = XLSX.read(dataP);
                allProducts = XLSX.utils.sheet_to_json(wbP.Sheets[wbP.SheetNames[0]]);

                // 2. CLIENTI
                const resC = await fetch('LISTA_CLIENTI.xlsx?t=' + Date.now());
                const dataC = await resC.arrayBuffer();
                const wbC = XLSX.read(dataC);
                allClients = XLSX.utils.sheet_to_json(wbC.Sheets[wbC.SheetNames[0]]);

                // 3. SOLDURI
                const resS = await fetch('Facturi_Neincasate.xlsx?t=' + Date.now());
                const dataS = await resS.arrayBuffer();
                const wbS = XLSX.read(dataS);
                allSold = XLSX.utils.sheet_to_json(wbS.Sheets[wbS.SheetNames[0]]);

                showToast("Sincronizat!");
            } catch(e) { alert("Eroare sync: " + e.message); }
        }

        function switchView(v) {
            document.querySelectorAll('#app-content > main > div').forEach(d => d.classList.add('view-hidden'));
            document.getElementById('view-' + v).classList.remove('view-hidden');
            if (v === 'clients') renderClients();
        }

        function renderClients() {
            const container = document.getElementById('clients-list');
            container.innerHTML = allClients.map((c, i) => `
                <div onclick="selectClient(${i})" class="p-6 bg-white shadow rounded-2xl border-l-8 border-blue-500 client-card">
                    <p class="font-black">${c.denumire || c.Denumire}</p>
                </div>
            `).join('');
        }

        function selectClient(i) {
            selectedClient = allClients[i];
            document.getElementById('header-client-name').innerText = selectedClient.denumire || selectedClient.Denumire;
            switchView('client-mode');
        }

        function renderSoldItems() {
            const name = selectedClient.denumire || selectedClient.Denumire;
            const container = document.getElementById('sold-items-table');
            const filtered = allSold.filter(s => (s.denumire || s.Denumire || "").toLowerCase().includes(name.toLowerCase()));
            container.innerHTML = filtered.map(s => `<div class="p-4 bg-white shadow rounded-xl">${s.factura} - ${s.rest} RON</div>`).join('');
        }

        function selectCategory(cat) {
            document.getElementById('product-section').classList.remove('view-hidden');
            document.getElementById('category-placeholder').classList.add('view-hidden');
            renderProducts(allProducts);
        }

        function renderProducts(prods) {
            const tbody = document.getElementById('productTableBody');
            tbody.innerHTML = prods.map(p => `
                <tr class="border-b">
                    <td class="p-4 font-black">${p.denumire || p.Denumire}</td>
                    <td class="p-4 font-black">${p.stoc || 0}</td>
                    <td class="p-4 font-black">${p.pret || 0}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
