<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DM Auto - Portal Agent</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#003366">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .bg-dm-blue { background-color: #003366; }
        .text-dm-yellow { color: #ffcc00; }
        .bg-dm-yellow { background-color: #ffcc00; }
        
        .category-card {
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
            aspect-ratio: 16/11;
            background-size: cover;
            background-position: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .category-card:active {
            transform: scale(0.95);
        }

        .category-overlay {
            background: linear-gradient(to top, rgba(0, 30, 60, 0.9) 0%, rgba(0, 30, 60, 0.2) 60%, transparent 100%);
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1rem;
        }

        .quick-order-table th {
            font-size: 9px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 10px 8px;
            position: sticky;
            top: 0;
            background: #f8fafc;
            z-index: 10;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: 900;
            transition: all 0.1s ease;
        }
        
        .qty-btn:active { transform: scale(0.9); }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #003366;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ffcc00;
            color: #003366;
            font-size: 10px;
            font-weight: 900;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }

        .view-hidden { display: none; }
        
        .selected-category {
            border: 3px solid #ffcc00;
        }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <header class="bg-dm-blue text-white p-5 pb-6 shadow-xl rounded-b-[2rem]">
        <div class="flex items-center gap-4 mb-5">
            <div class="bg-black p-2 rounded-lg border border-gray-700 shadow-lg">
                <div class="text-center leading-none">
                    <span class="text-white font-black text-2xl italic block tracking-tighter">DM</span>
                    <span class="text-dm-yellow font-black text-[11px] block tracking-[0.2em] -mt-1">AUTO</span>
                </div>
            </div>
            <div class="flex-1">
                <h1 class="text-sm font-medium opacity-90">Salut, <span class="font-black text-white">Calin Mocean!</span></h1>
                <p class="text-[10px] font-bold text-dm-yellow uppercase tracking-widest mt-0.5 italic">Agent Alba-Hunedoara</p>
            </div>
            
            <button onclick="document.getElementById('excelInput').click()" class="bg-white/10 p-3 rounded-2xl border border-white/20 active:scale-90 transition-all">
                <span class="text-xl">🔄</span>
            </button>
            <input type="file" id="excelInput" class="hidden" accept=".xlsx, .xls, .csv">
        </div>

        <div id="search-container" class="relative">
            <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="Caută produs în catalog..." 
                   class="w-full p-3.5 pr-12 rounded-xl text-gray-800 text-sm focus:outline-none shadow-2xl border-none font-semibold">
            <div class="absolute right-4 top-3.5 text-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>
    </header>

    <!-- Indicator Încărcare -->
    <div id="loadingOverlay" class="hidden mx-4 mt-2">
        <div class="bg-blue-50 border border-blue-100 p-3 rounded-lg flex items-center justify-center gap-3">
            <div class="loader"></div>
            <span id="loaderText" class="text-[10px] text-dm-blue font-black uppercase tracking-widest">Sincronizare...</span>
        </div>
    </div>

    <!-- VEDERE: CATALOG -->
    <div id="view-catalog" class="active-view">
        <div class="p-4 grid grid-cols-2 gap-4">
            <!-- Card Ravenol cu eveniment Click -->
            <div id="card-ravenol" onclick="selectCategory('Ravenol')" class="category-card" style="background-image: url('ravenol.jpg');">
                <div class="category-overlay">
                    <h3 class="text-white font-black text-xs uppercase italic tracking-tighter">RAVENOL</h3>
                </div>
            </div>
            <div class="category-card opacity-50" style="background-image: url('banner.jpg');">
                <div class="category-overlay"><h3 class="text-white font-black text-xs uppercase italic tracking-tighter">BANNER</h3></div>
            </div>
        </div>

        <!-- Secțiunea de produse (ascunsă inițial până la selecția unei categorii) -->
        <div id="product-section" class="px-4 view-hidden">
            <div class="flex justify-between items-center mb-3 px-1">
                <div class="flex items-center gap-2">
                    <h3 id="selected-category-title" class="text-xs font-black uppercase tracking-widest text-dm-blue italic">Produse</h3>
                    <button onclick="resetSelection()" class="text-[8px] bg-gray-200 px-2 py-0.5 rounded text-gray-500 font-bold uppercase">Închide</button>
                </div>
                <span id="productCount" class="text-[9px] text-gray-400 font-bold uppercase italic tracking-tighter">Se încarcă...</span>
            </div>
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 mb-8">
                <div class="overflow-x-auto max-h-[60vh]">
                    <table class="w-full text-left quick-order-table">
                        <thead class="bg-gray-50 border-b border-gray-100">
                            <tr>
                                <th class="w-1/2">Denumire</th>
                                <th class="text-center">Cant.</th>
                                <th class="text-right">Preț unitar</th>
                            </tr>
                        </thead>
                        <tbody id="productTableBody" class="divide-y divide-gray-50 text-[10px]"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Mesaj placeholder când nu e nimic selectat -->
        <div id="category-placeholder" class="p-10 text-center">
            <div class="bg-gray-50 border-2 border-dashed border-gray-200 rounded-2xl p-8">
                <span class="text-4xl block mb-3">👇</span>
                <p class="text-gray-400 font-black uppercase text-[10px] tracking-widest">Apasă pe o imagine de mai sus pentru a vedea produsele</p>
            </div>
        </div>
    </div>

    <!-- VEDERE: COȘ (FINALIZARE) -->
    <div id="view-cart" class="view-hidden p-4">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-black text-dm-blue uppercase italic">🛒 Coș Comandă</h2>
            <button onclick="golesteCos()" class="text-[10px] font-bold text-red-500 uppercase">Golește tot</button>
        </div>
        <div id="cart-content" class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden mb-6">
            <!-- Items appear here -->
        </div>
        
        <div id="cart-summary-box" class="bg-dm-blue text-white rounded-2xl p-6 shadow-2xl">
            <div class="flex justify-between border-b border-white/10 pb-3 mb-3">
                <span class="text-xs uppercase opacity-70">Total fără TVA</span>
                <span id="totalNoVat" class="font-bold">0.00 RON</span>
            </div>
            <div class="flex justify-between items-end">
                <span class="text-xs uppercase font-black text-dm-yellow">Total de Plată</span>
                <span id="totalVat" class="text-2xl font-black italic">0.00 RON</span>
            </div>
            <button id="btnTrimite" onclick="trimiteComanda()" class="w-full mt-6 bg-dm-yellow text-dm-blue py-4 rounded-xl font-black uppercase shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3">
                Trimite pe WhatsApp 🚀
            </button>
        </div>
    </div>

    <!-- VEDERE: ISTORIC -->
    <div id="view-history" class="view-hidden p-4">
        <h2 class="text-lg font-black text-dm-blue uppercase mb-4 italic">📋 Comenzi Trimise</h2>
        <div id="history-content" class="space-y-4">
            <!-- Order history appears here -->
        </div>
    </div>

    <!-- Navigare Jos -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 p-3 flex justify-around shadow-2xl z-50">
        <button onclick="switchView('catalog')" class="nav-btn flex flex-col items-center text-dm-blue" id="nav-catalog">
            <span class="text-2xl font-bold">🏠</span>
            <span class="text-[9px] font-black uppercase mt-1">Catalog</span>
        </button>
        <button onclick="switchView('cart')" class="nav-btn flex flex-col items-center text-gray-400 relative" id="nav-cart">
            <span class="text-2xl font-bold">🛒</span>
            <span class="text-[9px] font-black uppercase mt-1">Coș</span>
            <div id="cartBadge" class="cart-badge hidden">0</div>
        </button>
        <button onclick="switchView('history')" class="nav-btn flex flex-col items-center text-gray-400" id="nav-history">
            <span class="text-2xl font-bold">📋</span>
            <span class="text-[9px] font-black uppercase mt-1">Istoric</span>
        </button>
    </nav>

    <script>
        const CLOUD_EXCEL_FILE = 'OFERTA PRET RAVENOL 16.03.26.xlsx';
        let allProducts = [];
        let cart = {};
        let selectedCategory = null;
        let orderHistory = JSON.parse(localStorage.getItem('dmauto_order_history') || '[]');

        function switchView(viewName) {
            const views = ['catalog', 'cart', 'history'];
            views.forEach(v => {
                const el = document.getElementById(`view-${v}`);
                if (el) el.classList.add('view-hidden');
                const nav = document.getElementById(`nav-${v}`);
                if (nav) {
                    nav.classList.remove('text-dm-blue');
                    nav.classList.add('text-gray-400');
                }
            });

            const currentView = document.getElementById(`view-${viewName}`);
            if (currentView) currentView.classList.remove('view-hidden');
            const currentNav = document.getElementById(`nav-${viewName}`);
            if (currentNav) {
                currentNav.classList.remove('text-gray-400');
                currentNav.classList.add('text-dm-blue');
            }

            if (viewName === 'catalog') document.getElementById('search-container').classList.remove('view-hidden');
            else document.getElementById('search-container').classList.add('view-hidden');

            if (viewName === 'cart') renderCart();
            if (viewName === 'history') renderHistory();
        }

        // Funcția nouă pentru selecția categoriei
        function selectCategory(category) {
            selectedCategory = category;
            
            // UI Update
            document.getElementById('product-section').classList.remove('view-hidden');
            document.getElementById('category-placeholder').classList.add('view-hidden');
            document.getElementById('selected-category-title').innerText = category;
            
            // Highlight card
            document.getElementById('card-ravenol').classList.add('selected-category');
            
            // Render
            renderProducts(allProducts);
            
            // Scroll la listă
            document.getElementById('product-section').scrollIntoView({ behavior: 'smooth' });
        }

        function resetSelection() {
            selectedCategory = null;
            document.getElementById('product-section').classList.add('view-hidden');
            document.getElementById('category-placeholder').classList.remove('view-hidden');
            document.getElementById('card-ravenol').classList.remove('selected-category');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.addEventListener('load', async () => {
            if (window.location.protocol === 'blob:') {
                loadLocalData();
                return;
            }

            try {
                const filename = CLOUD_EXCEL_FILE;
                const response = await fetch(filename);
                if (response.ok) {
                    const data = new Uint8Array(await response.arrayBuffer());
                    processExcelData(data);
                } else {
                    loadLocalData();
                }
            } catch (e) {
                loadLocalData();
            }
        });

        function loadLocalData() {
            const saved = localStorage.getItem('dmauto_last_products');
            if (saved) {
                processJSONData(JSON.parse(saved));
            }
        }

        function processExcelData(data) {
            try {
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet, { range: 3, defval: "" });
                processJSONData(json);
            } catch (err) {
                console.error("Eroare procesare Excel:", err);
            }
        }

        function processJSONData(json) {
            allProducts = json.filter(p => {
                const keys = Object.keys(p);
                const kDenumire = keys.find(k => k.trim() === "Denumire");
                return p[kDenumire] && p[kDenumire].toString().trim() !== "" && p[kDenumire] !== "Denumire";
            });
            localStorage.setItem('dmauto_last_products', JSON.stringify(allProducts));
            
            // Nu mai randăm automat aici, așteptăm click pe card
            const countEl = document.getElementById('productCount');
            if(countEl) countEl.innerText = allProducts.length + " Produse";
        }

        document.getElementById('excelInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => processExcelData(new Uint8Array(event.target.result));
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function renderProducts(products) {
            const tbody = document.getElementById('productTableBody');
            if (!tbody) return;
            
            // Dacă nu e selectată nicio categorie, nu afișăm nimic (deși secțiunea e ascunsă oricum)
            if (!selectedCategory) {
                tbody.innerHTML = '';
                return;
            }

            let html = '';
            products.forEach((p, index) => {
                const keys = Object.keys(p);
                const kDenumire = keys.find(k => k.trim() === "Denumire");
                const kPretCuTva = keys.find(k => k.trim() === "Pret cu TVA");
                const denumire = p[kDenumire] || "";
                const pretCuTva = formatPriceNum(p[kPretCuTva]);
                const currentQty = cart[denumire] ? cart[denumire].quantity : 0;
                
                html += `
                    <tr class="${currentQty > 0 ? 'bg-yellow-50' : ''}">
                        <td class="pr-2 font-black text-dm-blue uppercase leading-tight tracking-tighter">
                            ${denumire}<br><span class="text-[8px] font-bold text-gray-400 italic">Preț unitar: ${pretCuTva.toFixed(2)} RON</span>
                        </td>
                        <td>
                            <div class="flex items-center justify-center gap-1.5 bg-gray-50 rounded-lg p-1 border border-gray-100">
                                <button onclick="updateCart('${denumire.replace(/'/g, "\\'")}', -1)" class="qty-btn bg-white text-gray-400 shadow-sm border border-gray-100">-</button>
                                <span class="font-black text-xs w-5 text-center text-dm-blue">${currentQty}</span>
                                <button onclick="updateCart('${denumire.replace(/'/g, "\\'")}', 1)" class="qty-btn bg-dm-blue text-white shadow-md">+</button>
                            </div>
                        </td>
                        <td class="text-right font-black text-dm-blue text-xs">${(currentQty * pretCuTva).toFixed(2)} <span class="text-[8px]">RON</span></td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function updateCart(prodName, delta) {
            const productData = allProducts.find(p => p[Object.keys(p).find(k => k.trim() === "Denumire")] === prodName);
            if (!productData) return;
            if (!cart[prodName]) cart[prodName] = { quantity: 0, data: productData };
            cart[prodName].quantity += delta;
            if (cart[prodName].quantity <= 0) delete cart[prodName];
            
            renderProducts(allProducts);
            updateBadge();
        }

        function updateBadge() {
            const count = Object.values(cart).reduce((sum, item) => sum + item.quantity, 0);
            const badge = document.getElementById('cartBadge');
            if (!badge) return;
            badge.innerText = count;
            badge.classList.toggle('hidden', count === 0);
        }

        function renderCart() {
            const container = document.getElementById('cart-content');
            if (!container) return;
            let html = '';
            let totalVat = 0, totalNoVat = 0;

            const items = Object.values(cart);
            if (items.length === 0) {
                container.innerHTML = '<div class="p-10 text-center text-gray-400 uppercase font-black text-xs italic">Coșul este gol</div>';
                document.getElementById('totalVat').innerText = '0.00 RON';
                document.getElementById('totalNoVat').innerText = '0.00 RON';
                document.getElementById('btnTrimite').disabled = true;
                document.getElementById('btnTrimite').style.opacity = "0.5";
                return;
            }

            document.getElementById('btnTrimite').disabled = false;
            document.getElementById('btnTrimite').style.opacity = "1";

            items.forEach(item => {
                const keys = Object.keys(item.data);
                const name = item.data[keys.find(k => k.trim() === "Denumire")];
                const pCu = formatPriceNum(item.data[keys.find(k => k.trim() === "Pret cu TVA")]);
                const pFara = formatPriceNum(item.data[keys.find(k => k.trim() === "Pret fara TVA")]);
                
                totalVat += pCu * item.quantity;
                totalNoVat += pFara * item.quantity;

                html += `
                    <div class="p-4 border-b border-gray-50 flex justify-between items-center">
                        <div class="w-2/3">
                            <p class="font-black text-dm-blue uppercase text-[11px] leading-tight">${name}</p>
                            <p class="text-[9px] font-bold text-gray-400 mt-1">${item.quantity} x ${pCu.toFixed(2)} RON (unitar)</p>
                        </div>
                        <div class="text-right font-black text-dm-blue text-xs">${(item.quantity * pCu).toFixed(2)} RON</div>
                    </div>
                `;
            });
            container.innerHTML = html;
            document.getElementById('totalVat').innerText = totalVat.toFixed(2) + ' RON';
            document.getElementById('totalNoVat').innerText = totalNoVat.toFixed(2) + ' RON';
        }

        function golesteCos() {
            cart = {};
            updateBadge();
            renderCart();
            renderProducts(allProducts);
        }

        function trimiteComanda() {
            const items = Object.values(cart);
            if (items.length === 0) return;

            const now = new Date();
            const timestamp = now.toLocaleString('ro-RO');
            let msg = `Salut! Comandă DM Auto Sebeș (Agent: Calin Mocean)\nData: ${timestamp}\n\n`;
            
            let total = 0;
            items.forEach(item => {
                const keys = Object.keys(item.data);
                const name = item.data[keys.find(k => k.trim() === "Denumire")];
                const pCu = formatPriceNum(item.data[keys.find(k => k.trim() === "Pret cu TVA")]);
                const subtotal = item.quantity * pCu;
                total += subtotal;
                msg += `• ${item.quantity} x ${name} (${pCu.toFixed(2)} RON/buc) = ${subtotal.toFixed(2)} RON\n`;
            });
            msg += `\nTOTAL DE PLATĂ: ${total.toFixed(2)} RON`;

            orderHistory.unshift({ timestamp, total: total.toFixed(2), items: items.length });
            localStorage.setItem('dmauto_order_history', JSON.stringify(orderHistory));

            cart = {};
            updateBadge();
            
            const encodedMsg = encodeURIComponent(msg);
            window.open(`https://wa.me/?text=${encodedMsg}`);
            switchView('history');
        }

        function renderHistory() {
            const container = document.getElementById('history-content');
            if (!container) return;
            if (orderHistory.length === 0) {
                container.innerHTML = '<div class="p-10 text-center text-gray-400 italic text-[10px]">Nicio comandă trimisă încă.</div>';
                return;
            }
            container.innerHTML = orderHistory.map(order => `
                <div class="bg-white p-4 rounded-2xl shadow-md border-l-4 border-dm-yellow">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[9px] font-black text-gray-400 uppercase italic">${order.timestamp}</span>
                        <span class="bg-green-100 text-green-700 text-[8px] px-2 py-0.5 rounded-full font-black uppercase">Trimisă</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <p class="text-[10px] font-bold text-dm-blue uppercase">${order.items} produse în comandă</p>
                        <p class="text-sm font-black text-dm-blue">${order.total} RON</p>
                    </div>
                </div>
            `).join('');
        }

        function formatPriceNum(val) {
            if (!val && val !== 0) return 0;
            if (typeof val === 'number') return val;
            return parseFloat(val.toString().replace(',', '.')) || 0;
        }

        function filterProducts() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            // Dacă nu e selectată nicio categorie, forțăm selecția pe Ravenol la căutare
            if (!selectedCategory && q.length > 0) {
                selectCategory('Ravenol');
            }
            const filtered = allProducts.filter(p => {
                const name = p[Object.keys(p).find(k => k.trim() === "Denumire")];
                return name && name.toString().toLowerCase().includes(q);
            });
            renderProducts(filtered);
        }
    </script>
</body>
</html>
